name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Newer push cancels the in-flight deploy — no failure email when superseded.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    runs-on: ubuntu-latest
    # This mirror is a FALLBACK (canonical = kk-cleaning.vercel.app). A push lands every 15 min,
    # so the next commit is the real retry for any GitHub Pages queue stall. Deploy failures here
    # are therefore never worth an email: the run stays green, and Luna's watchdog alerts instead
    # if the mirror CONTENT goes stale (>3h), which is the only signal that matters.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Pause for Pages queue to clear
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: retry
        name: Retry deploy (transient Pages queue stall)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
